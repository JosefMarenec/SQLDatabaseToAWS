# database.ini — Connection configuration template
# Copy this file and fill in real values; never commit credentials to source control.
# Secrets should be stored in AWS Secrets Manager in production.

[rds]
host     = <YOUR_RDS_ENDPOINT>.rds.amazonaws.com
port     = 5432
dbname   = ecommerce
user     = dbadmin
password = <REPLACE_WITH_SECRETS_MANAGER_VALUE>
sslmode  = require
# Retrieve at runtime: aws secretsmanager get-secret-value --secret-id ecommerce/rds/admin

[redshift]
host     = <YOUR_REDSHIFT_CLUSTER>.redshift.amazonaws.com
port     = 5439
dbname   = analytics
user     = dwadmin
password = <REPLACE_WITH_SECRETS_MANAGER_VALUE>
sslmode  = require
# Retrieve at runtime: aws secretsmanager get-secret-value --secret-id ecommerce/redshift/admin

[s3]
region          = us-east-1
raw_bucket      = ecommerce-datalake-raw
processed_bucket= ecommerce-datalake-processed
curated_bucket  = ecommerce-datalake-curated
scripts_bucket  = ecommerce-glue-scripts

[glue]
region          = us-east-1
database_name   = ecommerce_catalog
rds_connection  = ecommerce-rds-connection
job_rds_to_s3   = ecommerce-rds-to-s3
job_s3_to_redshift = ecommerce-s3-to-redshift
job_data_quality= ecommerce-data-quality

[lambda]
region          = us-east-1
event_processor = ecommerce-event-processor
data_validator  = ecommerce-data-validator
partition_manager = ecommerce-partition-manager
